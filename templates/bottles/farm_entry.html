{% extends 'base.html' %}

{% block content %}

<div style="
    max-width:900px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 8px 24px rgba(0,0,0,0.08);
">

    <!-- Header -->
    <div style="
        display:flex;
        flex-wrap:wrap;
        justify-content:space-between;
        align-items:center;
        gap:10px;
        margin-bottom:25px;
        border-bottom:1px solid #e5e7eb;
        padding-bottom:15px;
    ">
        <h2 style="
            margin:0;
            font-size:24px;
            color:#1f2937;
            font-weight:700;
        ">
            Farm Entry
        </h2>

        <a href="{% url 'bottles:washing_cycle' %}"
           style="
                background:#facc15;
                color:white;
                padding:8px 14px;
                text-decoration:none;
                border-radius:10px;
                font-weight:600;
                font-size:14px;
           ">
            Washing Cycle Entry
        </a>
    </div>

    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
            <div style="
                background:#fee2e2;
                color:#991b1b;
                padding:10px;
                margin-bottom:15px;
                border-radius:10px;
                font-weight:600;
                border:1px solid #fca5a5;
                font-size:14px;
            ">
                {{ message|linebreaks }}
            </div>
        {% endfor %}
    {% endif %}

    <!-- Form -->
    <form method="post">
        {% csrf_token %}

        <!-- Date -->
        <div style="margin-bottom:20px;">
            <label style="
                display:block;
                margin-bottom:6px;
                font-weight:600;
                color:#374151;
                font-size:14px;
            ">
                Date
            </label>

            <input type="date"
                   name="date"
                   required
                   style="
                        width:100%;
                        max-width:250px;
                        padding:10px;
                        border:1px solid #d1d5db;
                        border-radius:10px;
                        font-size:14px;
                   ">
        </div>

        <!-- Bottle Sections -->
        {% for bottle in bottle_types %}
        <div style="
            background:#f9fafb;
            padding:18px;
            margin-bottom:18px;
            border-radius:14px;
            border:1px solid #e5e7eb;
        ">

            <h4 style="
                margin-bottom:15px;
                color:#111827;
                font-size:18px;
                font-weight:600;
            ">
                {{ bottle.name }}
            </h4>

            <div style="
                display:grid;
                grid-template-columns:1fr;
                gap:15px;
            ">

                <!-- Sent -->
                <div>
                    <label style="font-weight:600; font-size:14px;">
                        Sent to Warehouse
                    </label>
                    <input type="number"
                           name="sent_{{ bottle.id }}"
                           min="0"
                           value="0"
                           style="
                                width:100%;
                                padding:10px;
                                border:1px solid #d1d5db;
                                border-radius:10px;
                           ">
                </div>

                <!-- Empty Received -->
                <div>
                    <label style="font-weight:600; font-size:14px;">
                        Empty Received
                    </label>
                    <input type="number"
                           name="empty_{{ bottle.id }}"
                           min="0"
                           value="0"
                           style="
                                width:100%;
                                padding:10px;
                                border:1px solid #d1d5db;
                                border-radius:10px;
                           ">
                </div>

                <!-- Breakage -->
                <div>
                    <label style="font-weight:600; font-size:14px;">
                        Breakage
                    </label>
                    <input type="number"
                           name="breakage_{{ bottle.id }}"
                           min="0"
                           value="0"
                           style="
                                width:100%;
                                padding:10px;
                                border:1px solid #d1d5db;
                                border-radius:10px;
                           ">
                </div>

                <!-- Reason -->
                <div>
                    <label style="font-weight:600; font-size:14px;">
                        Breakage Reason
                    </label>
                    <select name="reason_{{ bottle.id }}"
                            style="
                                width:100%;
                                padding:10px;
                                border:1px solid #d1d5db;
                                border-radius:10px;
                            ">
                        <option value="">---------</option>
                        <option value="DAMAGED_RETURN">Damaged Return</option>
                        <option value="HANDLING">Handling Issue</option>
                        <option value="WASHING_DAMAGE">Washing Damage</option>
                        <option value="CRACKED">Cracked Bottle</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>

            </div>

        </div>
        {% endfor %}

        <!-- Submit -->
        <button type="submit"
                style="
                    width:100%;
                    background:#facc15;
                    color:white;
                    padding:12px;
                    border:none;
                    border-radius:12px;
                    font-size:15px;
                    font-weight:600;
                    cursor:pointer;
                ">
            Save Farm Entry
        </button>

    </form>

</div>

{% endblock %}
